<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>灵感相册</title>
    <link rel="stylesheet" href="./styles.css?v=20260704-guardcut2" />
  </head>
  <body>
    <main class="app-shell" data-view="home">
      <section class="home-view" id="homeView">
        <header class="home-hero">
          <div>
            <p class="eyebrow">Capture Diary</p>
            <h1>灵感相册</h1>
            <p class="hero-copy">把美食、奶茶、人物和生活里的小瞬间拍下来，自动抠图，再变成一张张漂亮记录卡。</p>
          </div>
          <button id="openSavedFromHome" type="button" class="ghost-button">保存记录</button>
        </header>

        <section class="category-grid" id="categoryGrid" aria-label="分类入口"></section>
      </section>

      <section class="studio-view" id="studioView" hidden>
        <header class="studio-header">
          <button id="backHome" type="button" class="ghost-button">返回首页</button>
          <div>
            <p class="eyebrow" id="studioKicker">美食</p>
            <h2 id="studioTitle">今天吃了什么</h2>
            <p id="studioCopy">拍照或上传菜品，自动保留整盘菜并生成卡路里角标。</p>
          </div>
          <button id="openSavedFromStudio" type="button">保存记录</button>
        </header>

        <div class="studio-layout">
          <section class="capture-card">
            <div class="camera-stage">
              <video id="camera" autoplay playsinline muted></video>
              <canvas id="captureCanvas" hidden></canvas>
              <div class="empty-state" id="emptyState">
                <strong id="emptyTitle">拍照或上传图片</strong>
                <span id="emptyHint">让主体在画面中央，抠图会更稳定。</span>
              </div>
            </div>

            <div class="toolbar">
              <button id="toggleCamera" type="button">打开相机</button>
              <button id="takePhoto" type="button" disabled>拍照</button>
              <label class="file-button">
                上传照片
                <input id="fileInput" type="file" accept="image/*" capture="environment" />
              </label>
              <button id="autoCutout" type="button" disabled>自动抠图</button>
            </div>

            <section class="preview-grid" aria-label="图片预览">
              <figure>
                <figcaption>原图</figcaption>
                <img id="originalPreview" alt="原图预览" />
              </figure>
              <figure class="result-figure">
                <figcaption id="resultCaption">抠图结果</figcaption>
                <img id="cutoutPreview" alt="抠图预览" />
                <span class="badge" id="smartBadge" hidden></span>
              </figure>
            </section>
          </section>

          <aside class="editor-card">
            <form id="recordForm">
              <div class="field-row">
                <label for="recordDate">记录日期</label>
                <input id="recordDate" name="recordDate" type="date" required />
              </div>
              <div class="field-row">
                <label for="recordTitle">名称</label>
                <input id="recordTitle" name="recordTitle" type="text" />
              </div>
              <div class="field-row dynamic-field" id="placeField">
                <label for="recordPlace" id="placeLabel">来自哪家店</label>
                <input id="recordPlace" name="recordPlace" type="text" />
              </div>
              <div class="field-row dynamic-field" id="extraField">
                <label for="recordExtra" id="extraLabel">小记录</label>
                <input id="recordExtra" name="recordExtra" type="text" />
              </div>
              <div class="field-row">
                <label for="recordNotes">备注</label>
                <textarea id="recordNotes" name="recordNotes" rows="4"></textarea>
              </div>
              <div class="form-actions">
                <button type="submit">保存这张</button>
                <button id="clearForm" type="button" class="ghost-button">清空</button>
              </div>
            </form>
          </aside>
        </div>
      </section>

      <section class="saved-view" id="savedView" hidden>
        <header class="saved-header">
          <div>
            <p class="eyebrow">Saved</p>
            <h2>保存的信息</h2>
            <p>所有分类的记录都会放在这里，可以编辑、删除和导出。</p>
          </div>
          <div class="saved-actions">
            <button id="exportJson" type="button" class="ghost-button">导出</button>
            <button id="backFromSaved" type="button">返回</button>
          </div>
        </header>
        <div id="savedRecords" class="records"></div>
      </section>
    </main>

    <dialog id="editDialog">
      <form method="dialog" id="editForm">
        <h2>编辑记录</h2>
        <input id="editId" type="hidden" />
        <label>
          记录日期
          <input id="editDate" type="date" required />
        </label>
        <label>
          名称
          <input id="editTitle" type="text" />
        </label>
        <label>
          地点/来源
          <input id="editPlace" type="text" />
        </label>
        <label>
          小记录
          <input id="editExtra" type="text" />
        </label>
        <label>
          备注
          <textarea id="editNotes" rows="4"></textarea>
        </label>
        <menu>
          <button value="cancel" type="button" id="cancelEdit" class="ghost-button">取消</button>
          <button value="default" type="submit">保存</button>
        </menu>
      </form>
    </dialog>

    <script src="./app.js?v=20260704-guardcut2"></script>
  </body>
</html>
